{% load tz %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}ServerWatch{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f23;
      --bg-secondary: #1a1b3a;
      --bg-tertiary: #252641;
      --text-primary: #e4e4e7;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --border: #27272a;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --unknown: #6b7280;
      --card-bg: #181929;
      --hover-bg: #272844;
    }

    * { box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }
    
    h1 {
      margin: 0 0 24px;
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 16px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .nav {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    
    .nav a {
      padding: 8px 16px;
      background: var(--card-bg);
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 6px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    
    .nav a:hover, .nav a.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }
    
    .status-up { color: var(--success); }
    .status-down { color: var(--danger); }
    .status-unknown { color: var(--unknown); }
    
    .metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    
    .metric:last-child {
      border-bottom: none;
    }
    
    .metric-name {
      color: var(--text-secondary);
    }
    
    .metric-value {
      font-weight: 600;
    }
    
    .btn {
      padding: 8px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s;
    }
    
    .btn:hover {
      background: var(--accent-hover);
    }
    
    .alert {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
    }
    
    .alert-success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }
    
    .alert-warning {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid var(--warning);
      color: var(--warning);
    }
    
    .alert-danger {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
    }
  </style>
  
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="container">
    <nav class="nav">
      <a href="{% url 'dashboard' %}">Dashboard</a>
      <a href="{% url 'monitoring_mode' %}">Monitoring Mode</a>
      <a href="{% url 'network_dashboard' %}">Network</a>
      <a href="{% url 'cctv_dashboard' %}">CCTV</a>
      <form id="logout-form" action="{% url 'logout' %}" method="post" style="display: none;">
          {% csrf_token %}
      </form>
      <a href="#" onclick="document.getElementById('logout-form').submit(); return false;">Logout</a>
    </nav>
    
    {% block content %}{% endblock %}
  </div>
  
  {% block extra_js %}{% endblock %}
</body>
</html>
