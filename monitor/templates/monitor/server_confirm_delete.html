<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ServerWatch - Delete Server</title>
  <style>
    :root {
      --bg-primary: #0f0f23;
      --bg-secondary: #1a1b3a;
      --bg-tertiary: #252641;
      --text-primary: #e4e4e7;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --border: #27272a;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --unknown: #6b7280;
      --card-bg: #181929;
      --hover-bg: #272844;
    }

    * { box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }
    
    h1 {
      margin: 0 0 24px;
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    
    a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }
    
    .muted {
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    
    .card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      max-width: 640px;
      background: var(--card-bg);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
      transition: all 0.2s ease;
      border-left: 4px solid var(--danger);
    }
    
    .card:hover {
      border-color: var(--danger);
      transform: translateY(-2px);
      box-shadow: 0 8px 12px -1px rgba(0, 0, 0, 0.4);
    }
    
    p {
      font-size: 1.1rem;
      margin: 0 0 24px;
      color: var(--text-primary);
    }
    
    strong {
      color: var(--danger);
      font-weight: 600;
    }
    
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      font-size: 0.875rem;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .btn.danger {
      background: var(--danger);
      color: white;
      border: 1px solid var(--danger);
    }
    
    .btn.danger:hover {
      background: #dc2626;
      border-color: #dc2626;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
    
    .btn.secondary {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    
    .btn.secondary:hover {
      background: var(--hover-bg);
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
    }
    
    .fade-in {
      animation: fadeIn 0.3s ease-in;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="muted"><a href="{% url 'dashboard' %}">Back</a></div>
  <h1>Delete server</h1>

  <div class="card">
    <p>Are you sure you want to delete <strong>{{ server.name }}</strong> ({{ server.ip_address }}:{{ server.port }})?</p>
    <form method="post" style="margin-top: 14px; display: flex; gap: 10px; align-items: center;">
      {% csrf_token %}
      <button class="btn danger" type="submit">Delete</button>
      <a class="btn secondary" href="{% url 'dashboard' %}">Cancel</a>
    </form>
  </div>
</body>
</html>
