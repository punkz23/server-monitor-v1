name: server_monitor_mobile
description: A mobile application for monitoring servers and network infrastructure.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  flutter_riverpod: ^3.2.1
  fl_chart: ^1.1.1
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  google_fonts: ^8.0.2
  flutter_secure_storage: ^10.0.0
  connectivity_plus: ^7.0.0
  font_awesome_flutter: ^10.6.0
  timeago: ^3.6.1
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
